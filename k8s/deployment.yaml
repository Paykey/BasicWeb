apiVersion: apps/v1
kind: Deployment
metadata:
  name: basicweb-deployment
spec:
  replicas: 1 # 서버 하나만 띄우기
  selector:
    matchLabels:
      app: basicweb
  template:
    metadata:
      labels:
        app: basicweb
    spec:
      containers:
        - name: basicweb-container
          image: paykey/basicweb:ccde80edc439913c1c2f73b7423c7348e06aa537
          ports:
            - containerPort: 8000 # 컨테이너 내부에서 8000번 포트로 통신
